async function enviar() {
  const btn = document.getElementById("btn");
  const log = document.getElementById("log");
  btn.disabled = true;
  log.textContent = "Enviando " + linhas.length + " linhas...";
  try {
    const resp = await fetch(APPS_SCRIPT_URL + "?acao=importarbenslote", {
      method: "POST",
      body: JSON.stringify({ linhas: linhas })
    });
    const resultado = await resp.json();
    if (resultado.ok) {
      log.textContent = "Sucesso! " + resultado.linhasGravadas + " linhas gravadas na aba Bens, sem passar por CSV.";
    } else {
      log.textContent = "Erro retornado pelo Apps Script: " + JSON.stringify(resultado);
    }
  } catch (err) {
    log.textContent = "Erro de conexao: " + err.message;
  }
  btn.disabled = false;
}
